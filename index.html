<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akshat's Battle Royale 2D MAX</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #050b14; font-family: 'Segoe UI', Arial, sans-serif; color: white; user-select: none; }
        #canvas { display: block; background: #0f1b2d; }
        #hud { position: absolute; top: 20px; left: 20px; font-size: 18px; font-weight: bold; text-shadow: 2px 2px 4px #000; pointer-events: none; z-index: 5; }
        .hud-bar { width: 200px; height: 15px; background: #222; border: 2px solid #fff; margin-top: 5px; border-radius: 3px; }
        #healthFill { width: 100%; height: 100%; background: #ff2a2a; }
        #killFeed { position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%); background: rgba(255, 0, 0, 0.25); border: 2px solid #ff3333; color: #fff; padding: 12px 30px; font-size: 24px; font-weight: bold; border-radius: 8px; display: none; text-shadow: 2px 2px 4px #000; z-index: 10; box-shadow: 0 0 15px rgba(255,0,0,0.4); text-transform: uppercase; }
        #menu { position: absolute; width: 100%; height: 100%; top:0; left:0; background: rgba(5,15,35,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; text-align: center; }
        #menu h1 { font-size: 45px; color: #00ffca; text-shadow: 0 0 20px rgba(0,255,202,0.4); margin-bottom: 10px; }
        #menu p { color: #aaa; margin-bottom: 30px; max-width: 500px; font-size: 15px; line-height: 1.5; }
        .btn { background: #00ffca; color: #000; border: none; padding: 15px 40px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; text-transform: uppercase; box-shadow: 0 0 15px #00ffca; }
        #prompt { position: absolute; bottom: 25%; left: 50%; transform: translateX(-50%); color: #00ffca; font-size: 22px; font-weight: bold; display: none; text-shadow: 2px 2px 4px #000; z-index: 5; }
    </style>
</head>

    <div id="hud">

        <div>जीवित दुश्मन: <span id="enemyCount">50</span>/50</div>
        <div>हथियार: <span id="gunStatus" style="color: #ffcc00;">निहत्थे 👊</span></div>
        <div style="margin-top: 5px;">HP:</div>
        <div class="hud-bar"><div id="healthFill"></div></div>
    </div>

    <div id="killFeed">💀 AKSHAT KILLED DYNAMO!</div>

    <div id="menu">
        <h1>BATTLE ROYALE 2D: MAX</h1>
        <p>
            <b>कंट्रोल्स:</b><br>
            • आगे/पीछे/साइड: <b>W, A, S, D</b> या <b>Arrow Keys</b><br>
            • गन लूट: बॉक्स के पास जाकर <b>[E]</b> दबाएं<br>

        </p>
        <button class="btn" onclick="start2DBR()">START MATCH</button>
    </div>
